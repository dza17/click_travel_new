<!DOCTYPE html>
<html class="dark" lang="ru"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Click Travel - Выбор дат</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "background":          "#0B0F1A",
                    "primary":             "#3B82F6",
                    "on-surface":          "#FFFFFF",
                    "on-surface-variant":  "#9CA3AF",
                    "success":             "#22C55E"
                },
                fontFamily: {
                    "headline": ["Manrope","sans-serif"],
                    "body":     ["Manrope","sans-serif"]
                }
            }
        }
    }
</script>
<style>
    * { box-sizing: border-box; }

    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    body {
        font-family: 'Manrope', sans-serif;
        background: #020617;
        height: 100dvh;
        overflow: hidden;
        display: flex;
        align-items: flex-end;
        margin: 0;
    }

    /* Bottom sheet fills 92% of dynamic viewport height */
    .sheet {
        width: 100%;
        max-width: 512px;
        height: 92dvh;
        background: #0B101E;
        border-radius: 32px 32px 0 0;
        box-shadow: 0 -10px 40px rgba(0,0,0,0.6);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    /* Scrollable calendar area */
    .scroll-area {
        flex: 1;
        overflow-y: auto;
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
    .scroll-area::-webkit-scrollbar { display: none; }

    /* CTA footer — in normal flex flow, not absolute */
    .cta-footer {
        flex-shrink: 0;
        padding: 12px 24px max(24px, env(safe-area-inset-bottom)) 24px;
        background: linear-gradient(to top, #0B101E 80%, transparent);
    }

    /* Calendar grid */
    .cal-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
    }

    .glow { box-shadow: 0 0 18px rgba(59,130,246,0.45); }
</style>
</head>
<body>
<div class="sheet mx-auto">

    <!-- ① Drag handle -->
    <div class="flex justify-center pt-3 pb-1 flex-shrink-0">
        <div style="width:40px;height:4px;background:rgba(255,255,255,0.1);border-radius:9999px;"></div>
    </div>

    <!-- ② Header row -->
    <header class="flex items-center justify-between px-6 flex-shrink-0" style="height:56px;">
        <button onclick="window.location.href='index.html'"
                class="flex items-center justify-center rounded-full hover:bg-white/10 transition-colors active:scale-95"
                style="width:40px;height:40px;">
            <span class="material-symbols-outlined text-white text-2xl">close</span>
        </button>
        <h1 class="font-headline font-bold text-white flex items-center gap-2" style="font-size:17px;">
            Ташкент
            <span class="material-symbols-outlined text-primary" style="font-size:20px;">east</span>
            Москва
        </h1>
        <div style="width:40px;"></div>
    </header>

    <!-- ③ Tab selector — FIXED inside sheet, NOT inside scroll area -->
    <div class="px-4 pb-3 flex-shrink-0">
        <div style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.05);border-radius:9999px;padding:6px;display:flex;gap:4px;">
            <button id="tab-dep"
                    onclick="handleTabTap('departure')"
                    style="flex:1;border:none;border-radius:9999px;padding:10px 16px;cursor:pointer;transition:all 0.25s;">
                <span style="display:block;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;line-height:1.2;">Туда</span>
                <span id="tab-dep-date" style="display:block;font-size:18px;font-weight:800;text-transform:uppercase;line-height:1.2;">—</span>
            </button>
            <button id="tab-ret"
                    onclick="handleTabTap('return')"
                    style="flex:1;border:none;border-radius:9999px;padding:10px 16px;cursor:pointer;transition:all 0.25s;">
                <span style="display:block;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;line-height:1.2;">Обратно</span>
                <span id="tab-ret-date" style="display:block;font-size:18px;font-weight:800;text-transform:uppercase;line-height:1.2;">—</span>
            </button>
        </div>
    </div>

    <!-- ④ Scrollable calendar -->
    <div class="scroll-area px-4" id="calendar-wrap"></div>

    <!-- ⑤ CTA footer -->
    <div class="cta-footer">

        <!-- Tip block (dismissible) -->
        <div id="tip-block" style="background:#111827;border:1px solid rgba(255,255,255,0.05);border-radius:16px;padding:12px 12px 12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:12px;">
            <div style="width:32px;height:32px;background:rgba(34,197,94,0.1);border-radius:9999px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <span class="material-symbols-outlined text-success" style="font-size:18px;font-variation-settings:'FILL' 1;">lightbulb</span>
            </div>
            <p style="font-size:12px;line-height:1.4;color:#9CA3AF;flex:1;margin:0;">
                Полёты в середине недели предлагают <span style="color:#22C55E;font-weight:700;">лучшую экономию до 35%</span>.
            </p>
            <button onclick="dismissTip()"
                    style="width:28px;height:28px;background:rgba(255,255,255,0.06);border:none;border-radius:9999px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;">
                <span class="material-symbols-outlined" style="font-size:16px;color:#9CA3AF;">close</span>
            </button>
        </div>

        <button id="cta-btn"
                onclick="handleCTA()"
                class="font-headline"
                style="width:100%;height:52px;border:none;border-radius:9999px;font-size:17px;font-weight:800;color:white;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;">
            Выберите дату вылета
        </button>
    </div>

</div>

<script>
// ─── HELPERS ─────────────────────────────────────────────────────────────────

const MONTH_NAMES  = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const MONTH_SHORT  = ['ЯНВ','ФЕВ','МАР','АПР','МАЙ','ИЮН','ИЮЛ','АВГ','СЕН','ОКТ','НОЯ','ДЕК'];
const DAY_NAMES    = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

const TODAY = new Date();
TODAY.setHours(0,0,0,0);

function toKey(d)   { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function fromKey(k) { const [y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d); }
function pad(n)     { return String(n).padStart(2,'0'); }
function sameDay(a,b){ return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
function isAfterEq(a,b){ return a >= b || sameDay(a,b); } // a >= b calendar-wise
function isBetween(d,s,e){ return d > s && d < e && !sameDay(d,s) && !sameDay(d,e); }
function isPast(d)  { return d < TODAY && !sameDay(d, TODAY); }

function formatShort(d) {
    if (!d) return '—';
    return `${d.getDate()} ${MONTH_SHORT[d.getMonth()]}`;
}

// Pseudo-random price based on date (for demo)
function getPrice(date) {
    const dow  = date.getDay(); // 0=Sun … 6=Sat
    const mid  = dow >= 2 && dow <= 4; // Tue/Wed/Thu cheaper
    const seed = (date.getDate() * 7 + date.getMonth() * 13) % 25;
    const base = mid ? 0.80 : 1.15;
    const val  = +(base + seed / 100).toFixed(2);
    return { price: `${val} м`, low: val < 1.0 };
}

// ─── STATE ───────────────────────────────────────────────────────────────────

const state = {
    departureDate: null,
    returnDate:    null,
    activeField:   'departure'  // 'departure' | 'return'
};

// ─── SELECTION LOGIC ─────────────────────────────────────────────────────────

function handleDateTap(key) {
    const tapped = fromKey(key);
    if (isPast(tapped)) return; // block past dates

    const { departureDate, returnDate, activeField } = state;

    if (activeField === 'departure') {
        state.departureDate = tapped;
        // invalidate return if it's no longer after departure
        if (returnDate && !isAfterEq(returnDate, tapped)) state.returnDate = null;
        state.activeField = 'return';

    } else {
        // activeField === 'return'
        if (!departureDate) {
            state.departureDate = tapped;
            state.activeField   = 'return';
        } else if (returnDate) {
            // Both already set → start new cycle
            state.departureDate = tapped;
            state.returnDate    = null;
            state.activeField   = 'return';
        } else {
            // Departure set, return empty
            if (!isPast(tapped) && isAfterEq(tapped, departureDate)) {
                state.returnDate  = tapped;
                // stay on 'return' so user can change if needed
            } else {
                // Tapped earlier → become new departure
                state.departureDate = tapped;
                state.returnDate    = null;
                state.activeField   = 'return';
            }
        }
    }

    render();
}

function handleTabTap(field) {
    state.activeField = field;
    render();
}

function handleCTA() {
    if (state.departureDate) window.location.href = 'index.html';
}

function dismissTip() {
    const el = document.getElementById('tip-block');
    if (el) el.style.display = 'none';
}

// ─── RENDER ──────────────────────────────────────────────────────────────────

function render() {
    renderTabs();
    renderCTA();
    renderCalendar();
}

function renderTabs() {
    const { departureDate, returnDate, activeField } = state;

    const tabDep    = document.getElementById('tab-dep');
    const tabRet    = document.getElementById('tab-ret');
    const depDateEl = document.getElementById('tab-dep-date');
    const retDateEl = document.getElementById('tab-ret-date');

    // Active = blue pill; inactive = transparent
    [tabDep, tabRet].forEach(btn => {
        btn.style.background = 'transparent';
        btn.style.color      = '#9CA3AF';
    });

    const active = activeField === 'departure' ? tabDep : tabRet;
    active.style.background = '#3B82F6';
    active.style.color      = '#FFFFFF';

    depDateEl.textContent   = departureDate ? formatShort(departureDate) : '—';
    depDateEl.style.opacity = departureDate ? '1' : '0.4';

    retDateEl.textContent   = returnDate    ? formatShort(returnDate)    : '—';
    retDateEl.style.opacity = returnDate    ? '1' : '0.4';
}

function renderCTA() {
    const btn = document.getElementById('cta-btn');
    const { departureDate, returnDate } = state;

    if (!departureDate) {
        btn.style.background  = '#1F2937';
        btn.style.boxShadow   = 'none';
        btn.textContent       = 'Выберите дату вылета';
    } else if (!returnDate) {
        btn.style.background  = '#3B82F6';
        btn.style.boxShadow   = '0 4px 20px rgba(59,130,246,0.35)';
        btn.textContent       = `Туда: ${formatShort(departureDate)} · укажите обратно`;
    } else {
        btn.style.background  = '#3B82F6';
        btn.style.boxShadow   = '0 4px 20px rgba(59,130,246,0.35)';
        btn.textContent       = `${formatShort(departureDate)} — ${formatShort(returnDate)}`;
    }
}

// ─── CALENDAR RENDER ─────────────────────────────────────────────────────────

// Build 4 months from today's month
function getMonthsToRender() {
    const months = [];
    const base   = new Date(TODAY.getFullYear(), TODAY.getMonth(), 1);
    for (let i = 0; i < 4; i++) {
        const d = new Date(base.getFullYear(), base.getMonth() + i, 1);
        months.push({ year: d.getFullYear(), month: d.getMonth() });
    }
    return months;
}

function getDaysInMonth(y, m) { return new Date(y, m+1, 0).getDate(); }
function getOffset(y, m)      { return (new Date(y, m, 1).getDay() + 6) % 7; } // Mon=0

function getDayState(date) {
    const { departureDate, returnDate } = state;
    if (!departureDate)                                     return 'default';
    if (sameDay(date, departureDate))                       return 'departure';
    if (returnDate && sameDay(date, returnDate))            return 'return';
    if (returnDate && isBetween(date, departureDate, returnDate)) return 'range';
    return 'default';
}

function buildDayCell(year, month, day) {
    const date   = new Date(year, month, day);
    const key    = toKey(date);
    const past   = isPast(date);
    const ds     = past ? 'past' : getDayState(date);
    const info   = getPrice(date);

    const outer  = document.createElement('div');
    outer.style.cssText = 'display:flex;flex-direction:column;align-items:center;justify-content:center;height:56px;cursor:pointer;user-select:none;';
    if (!past) outer.onclick = () => handleDateTap(key);

    if (ds === 'departure' || ds === 'return') {
        outer.innerHTML = `
            <div class="glow" style="width:44px;height:44px;background:#3B82F6;border-radius:9999px;display:flex;flex-direction:column;align-items:center;justify-content:center;">
                <span style="font-size:16px;font-weight:700;color:white;line-height:1.1;">${day}</span>
                <span style="font-size:8px;color:rgba(255,255,255,0.75);text-transform:uppercase;">${info.price}</span>
            </div>`;

    } else if (ds === 'range') {
        outer.style.padding = '2px';
        outer.innerHTML = `
            <div style="width:100%;height:100%;background:rgba(59,130,246,0.2);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;">
                <span style="font-size:15px;font-weight:500;color:white;line-height:1.1;">${day}</span>
                <span style="font-size:9px;color:${info.low?'#22C55E':'#9CA3AF'};${info.low?'font-weight:600;':''}">${info.price}</span>
            </div>`;

    } else if (ds === 'past') {
        outer.style.cursor = 'default';
        outer.innerHTML = `
            <span style="font-size:15px;font-weight:500;color:rgba(255,255,255,0.2);line-height:1.1;">${day}</span>
            <span style="font-size:9px;color:rgba(156,163,175,0.2);">${info.price}</span>`;

    } else {
        // Default: low-price dates get subtle green bg
        if (info.low) outer.style.padding = '2px';
        outer.innerHTML = info.low
            ? `<div style="width:100%;height:100%;background:rgba(34,197,94,0.08);border-radius:9999px;display:flex;flex-direction:column;align-items:center;justify-content:center;">
                   <span style="font-size:15px;font-weight:500;color:white;line-height:1.1;">${day}</span>
                   <span style="font-size:9px;color:#22C55E;font-weight:600;">${info.price}</span>
               </div>`
            : `<span style="font-size:15px;font-weight:500;color:white;line-height:1.1;">${day}</span>
               <span style="font-size:9px;color:#9CA3AF;">${info.price}</span>`;
    }

    return outer;
}

function renderCalendar() {
    const wrap = document.getElementById('calendar-wrap');
    wrap.innerHTML = '';

    getMonthsToRender().forEach(({ year, month }) => {
        const section    = document.createElement('div');
        section.style.marginBottom = '32px';

        // Month title
        const title = document.createElement('div');
        title.style.cssText = 'font-size:22px;font-weight:700;color:white;padding:0 8px 20px 8px;';
        title.textContent   = `${MONTH_NAMES[month]} ${year}`;
        section.appendChild(title);

        // Weekday header
        const weekRow = document.createElement('div');
        weekRow.className = 'cal-grid';
        weekRow.style.marginBottom = '4px';
        DAY_NAMES.forEach(d => {
            const cell = document.createElement('div');
            cell.style.cssText = 'text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#9CA3AF;opacity:0.4;padding:8px 0;';
            cell.textContent   = d;
            weekRow.appendChild(cell);
        });
        section.appendChild(weekRow);

        // Days grid
        const grid   = document.createElement('div');
        grid.className = 'cal-grid';
        const offset = getOffset(year, month);
        const days   = getDaysInMonth(year, month);

        for (let i = 0; i < offset; i++) {
            const empty = document.createElement('div');
            empty.style.height = '56px';
            grid.appendChild(empty);
        }
        for (let day = 1; day <= days; day++) {
            grid.appendChild(buildDayCell(year, month, day));
        }

        section.appendChild(grid);
        wrap.appendChild(section);
    });
}

// ─── INIT ────────────────────────────────────────────────────────────────────
render();
</script>
</body></html>
